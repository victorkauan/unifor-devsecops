networks:
  devsecops:
    driver: bridge

volumes:
  jenkins_home:
  defectdojo_media:
  defectdojo_postgres:
  dtrack_data:

services:

  # ─── Jenkins ────────────────────────────────────────────────
  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "${JENKINS_PORT:-9090}:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - devsecops

  # ─── DefectDojo ─────────────────────────────────────────────
  dd-postgres:
    image: postgres:16-alpine
    container_name: dd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DD_DB_NAME:-defectdojo}
      POSTGRES_USER: ${DD_DB_USER:-defectdojo}
      POSTGRES_PASSWORD: ${DD_DB_PASSWORD:-defectdojo123}
    volumes:
      - defectdojo_postgres:/var/lib/postgresql/data
    networks:
      - devsecops

  dd-redis:
    image: redis:7-alpine
    container_name: dd-redis
    restart: unless-stopped
    networks:
      - devsecops

  dd-initializer:
    image: defectdojo/defectdojo-django:latest
    container_name: dd-initializer
    entrypoint: ["/wait-for-it.sh", "dd-postgres:5432", "--timeout=60", "--", "/entrypoint-initializer.sh"]
    environment:
      DD_DATABASE_URL: postgresql://${DD_DB_USER:-defectdojo}:${DD_DB_PASSWORD:-defectdojo123}@dd-postgres:5432/${DD_DB_NAME:-defectdojo}
      DD_SECRET_KEY: ${DD_SECRET_KEY}
      DD_CREDENTIAL_AES_256_KEY: ${DD_CREDENTIAL_AES_256_KEY}
      DD_ADMIN_USER: ${DD_ADMIN_USER:-admin}
      DD_ADMIN_PASSWORD: ${DD_ADMIN_PASSWORD:-admin123}
      DD_ADMIN_MAIL: ${DD_ADMIN_MAIL:-admin@devsecops.local}
      DD_ALLOWED_HOSTS: "*"
    depends_on:
      - dd-postgres
    networks:
      - devsecops

  uwsgi:
    image: defectdojo/defectdojo-django:latest
    container_name: dd-uwsgi
    entrypoint: ["/wait-for-it.sh", "dd-postgres:5432", "--timeout=60", "--", "/entrypoint-uwsgi.sh"]
    environment:
      DD_DATABASE_URL: postgresql://${DD_DB_USER:-defectdojo}:${DD_DB_PASSWORD:-defectdojo123}@dd-postgres:5432/${DD_DB_NAME:-defectdojo}
      DD_SECRET_KEY: ${DD_SECRET_KEY}
      DD_CREDENTIAL_AES_256_KEY: ${DD_CREDENTIAL_AES_256_KEY}
      DD_ALLOWED_HOSTS: "*"
      DD_CELERY_BROKER_URL: redis://dd-redis:6379/0
    volumes:
      - defectdojo_media:/app/media
    depends_on:
      dd-initializer:
        condition: service_completed_successfully
      dd-redis:
        condition: service_started
    networks:
      - devsecops

  dd-celeryworker:
    image: defectdojo/defectdojo-django:latest
    container_name: dd-celeryworker
    entrypoint: ["/wait-for-it.sh", "dd-postgres:5432", "--timeout=60", "--", "/entrypoint-celery-worker.sh"]
    environment:
      DD_DATABASE_URL: postgresql://${DD_DB_USER:-defectdojo}:${DD_DB_PASSWORD:-defectdojo123}@dd-postgres:5432/${DD_DB_NAME:-defectdojo}
      DD_SECRET_KEY: ${DD_SECRET_KEY}
      DD_CREDENTIAL_AES_256_KEY: ${DD_CREDENTIAL_AES_256_KEY}
      DD_CELERY_BROKER_URL: redis://dd-redis:6379/0
    depends_on:
      uwsgi:
        condition: service_started
      dd-redis:
        condition: service_started
    networks:
      - devsecops

  dd-celerybeat:
    image: defectdojo/defectdojo-django:latest
    container_name: dd-celerybeat
    entrypoint: ["/wait-for-it.sh", "dd-postgres:5432", "--timeout=60", "--", "/entrypoint-celery-beat.sh"]
    environment:
      DD_DATABASE_URL: postgresql://${DD_DB_USER:-defectdojo}:${DD_DB_PASSWORD:-defectdojo123}@dd-postgres:5432/${DD_DB_NAME:-defectdojo}
      DD_SECRET_KEY: ${DD_SECRET_KEY}
      DD_CREDENTIAL_AES_256_KEY: ${DD_CREDENTIAL_AES_256_KEY}
      DD_CELERY_BROKER_URL: redis://dd-redis:6379/0
    depends_on:
      uwsgi:
        condition: service_started
      dd-redis:
        condition: service_started
    networks:
      - devsecops

  dd-nginx:
    image: defectdojo/defectdojo-nginx:latest
    container_name: dd-nginx
    restart: unless-stopped
    ports:
      - "${DEFECTDOJO_PORT:-8080}:8080"
    volumes:
      - defectdojo_media:/usr/share/nginx/html/media
    depends_on:
      - uwsgi
    networks:
      - devsecops

  # ─── Dependency Track ────────────────────────────────────────
  dtrack-apiserver:
    image: dependencytrack/apiserver:latest
    container_name: dtrack-apiserver
    restart: unless-stopped
    ports:
      - "${DTRACK_API_PORT:-8081}:8080"
    volumes:
      - dtrack_data:/data
    environment:
      ALPINE_DATABASE_MODE: internal
    networks:
      - devsecops

  dtrack-frontend:
    image: dependencytrack/frontend:latest
    container_name: dtrack-frontend
    restart: unless-stopped
    ports:
      - "${DTRACK_FRONTEND_PORT:-8082}:8080"
    environment:
      API_BASE_URL: http://localhost:${DTRACK_API_PORT:-8081}
    depends_on:
      - dtrack-apiserver
    networks:
      - devsecops
